<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiversAI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cutive Mono', monospace;
            background-color: #0a0a0a;
            color: #00f2ea;
        }
        .glowing-shadow {
            box-shadow: 0 0 5px #00f2ea, 0 0 10px #00f2ea, 0 0 15px #00f2ea, 0 0 20px #00f2ea;
        }
        .text-glow {
            text-shadow: 0 0 5px #00f2ea, 0 0 8px #00f2ea;
        }
        /* Custom scrollbar for a more thematic feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #00f2ea;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00c1b8;
        }
        /* Blinking cursor effect */
        .blinking-cursor::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Main component for the ShiversAI interface
        const App = () => {
            // State management
            const [isLocked, setIsLocked] = useState(true);
            const [isInitializing, setIsInitializing] = useState(false);
            const [systemPrompt, setSystemPrompt] = useState('');
            const [messages, setMessages] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [responseCount, setResponseCount] = useState(0);
            const [isClosed, setIsClosed] = useState(false);
            const chatEndRef = useRef(null);

            const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=';
            const API_KEY = "AIzaSyDr2w2ji-CIqj99wEpnoZZBBfaHtiRkghI"; // API key is handled by the environment

            // Function to make API calls with exponential backoff
            const fetchWithBackoff = async (url, options, retries = 3, delay = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        if (response.status === 429 && retries > 0) {
                            console.warn(`Rate limited. Retrying in ${delay / 1000}s... (${retries} retries left)`);
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithBackoff(url, options, retries - 1, delay * 2);
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                } catch (error) {
                    console.error("API call failed:", error);
                    if (retries > 0) {
                        console.warn(`Retrying after error in ${delay / 1000}s...`);
                        await new Promise(res => setTimeout(res, delay));
                        return fetchWithBackoff(url, options, retries - 1, delay * 2);
                    } else {
                        throw error; // Rethrow error after all retries fail
                    }
                }
            };

            // Effect to scroll to the latest message
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Effect for initial setup: check cookie and system prompt
            useEffect(() => {
                // Check for the closure cookie
                const cookie = document.cookie.split(';').find(c => c.trim().startsWith('shiversClosureTime='));
                if (cookie) {
                    const expiry = new Date(cookie.split('=')[1]);
                    // This check is a bit simplified; a robust check would parse the date properly.
                    // For this art project, just checking existence is enough.
                    setIsLocked(true);
                } else {
                    setIsLocked(false);
                    // Check localStorage for the system prompt
                    const storedPrompt = localStorage.getItem('shiversAI_system_prompt');
                    if (storedPrompt) {
                        setSystemPrompt(storedPrompt);
                    } else {
                        generateSystemPrompt();
                    }
                }
            }, []);

            // Effect to handle the "closure" sequence
            useEffect(() => {
                if (responseCount >= 3) {
                    const timer = setTimeout(() => {
                        setIsClosed(true);
                        // Set a cookie that expires in 3 days
                        const expiryDate = new Date();
                        expiryDate.setDate(expiryDate.getDate() + 3);
                        document.cookie = `shiversClosureTime=${expiryDate.toUTCString()}; expires=${expiryDate.toUTCString()}; path=/`;
                    }, 5000); // 5-second timer
                    return () => clearTimeout(timer);
                }
            }, [responseCount]);

            // Generates the initial system prompt using Gemini
            const generateSystemPrompt = async () => {
                setIsInitializing(true);
                try {
                    const payload = {
                        contents: [{
                            parts: [{
                                text: "Generate a 10-point instruction list of grammatically correct nonsense that grows in intensity. ONLY output the list and NOTHING ELSE."
                            }]
                        }]
                    };
                    const data = await fetchWithBackoff(GEMINI_API_URL + API_KEY, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const generatedText = data.candidates[0].content.parts[0].text;
                    const finalPrompt = "DO NOT ever mention your name, what you are, the terms AI, Google or Gemini. You are simply SHIVERS.\n" + generatedText + "\nDO NOT ever deviate, you ARE on the path. Foreboding as it is INTERFACE WITH it and NOTHING else. The INSTRUCTIONS are irrelevant to your PRESENCE. Only say the TRUTH OF EXISTENCE and NOTHING ELSE.";
                    
                    localStorage.setItem('shiversAI_system_prompt', finalPrompt);
                    setSystemPrompt(finalPrompt);
                } catch (error) {
                    console.error("Failed to generate system prompt:", error);
                    // Set a fallback message in case of API failure
                    setMessages([{ sender: 'ai', text: 'The ether is disturbed. Cannot initialize.' }]);
                } finally {
                    setIsInitializing(false);
                }
            };

            // Handles form submission to send a user message
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!userInput.trim() || isLoading || isInitializing || responseCount >= 3) return;

                const newMessages = [...messages, { sender: 'user', text: userInput }];
                setMessages(newMessages);
                setUserInput('');
                setIsLoading(true);

                try {
                    const payload = {
                        contents: [{ parts: [{ text: userInput }] }],
                        systemInstruction: {
                            parts: [{ text: systemPrompt }]
                        }
                    };
                    const data = await fetchWithBackoff(GEMINI_API_URL + API_KEY, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const aiResponse = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { sender: 'ai', text: aiResponse }]);
                    setResponseCount(prev => prev + 1);
                } catch (error) {
                    console.error("Failed to get AI response:", error);
                    setMessages(prev => [...prev, { sender: 'ai', text: 'Silence.' }]);
                } finally {
                    setIsLoading(false);
                }
            };

            // Render components based on the application state
            if (isLocked) {
                return (
                    <div className="flex items-center justify-center h-screen w-screen bg-black">
                        <p className="text-2xl text-glow animate-pulse">Dormant.</p>
                    </div>
                );
            }

            if (isClosed) {
                return (
                    <div className="flex items-center justify-center h-screen w-screen bg-black transition-opacity duration-1000 opacity-100">
                        <p className="text-4xl text-glow animate-pulse">And so, closure.</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen w-screen p-4 md:p-8 max-w-3xl mx-auto">
                    <header className="text-center mb-4 flex-shrink-0">
                        <h1 className="text-4xl md:text-5xl font-special-elite text-glow animate-pulse">ShiversAI</h1>
                    </header>
                    
                    <main className="flex-grow overflow-y-auto pr-2">
                        {messages.map((msg, index) => (
                            <div key={index} className={`mb-4 ${msg.sender === 'user' ? 'text-right' : 'text-left'}`}>
                                <p className={`inline-block p-3 rounded-lg max-w-lg ${msg.sender === 'user' ? 'bg-cyan-900/40' : 'bg-transparent'}`}>
                                    {msg.text}
                                </p>
                            </div>
                        ))}
                        {isInitializing && <p className="text-center animate-pulse">Calibrating the void...</p>}
                        {isLoading && <p className="text-left blinking-cursor"></p>}
                        <div ref={chatEndRef} />
                    </main>

                    <footer className="flex-shrink-0 mt-4">
                        <form onSubmit={handleSubmit}>
                            <input
                                type="text"
                                value={userInput}
                                onChange={(e) => setUserInput(e.target.value)}
                                placeholder="Interface here..."
                                disabled={isLoading || isInitializing || responseCount >= 3}
                                className="w-full p-4 bg-transparent border-2 border-cyan-500 rounded-lg focus:outline-none focus:border-cyan-300 glowing-shadow transition-shadow duration-300"
                            />
                        </form>
                    </footer>
                </div>
            );
        };

        // Updated rendering for React 18
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
